<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TrustLens</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 10px;
    }

    .logo-mark {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
    }

    .logo-text {
      font-size: 16px; font-weight: 700;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    main {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px;
    }

    .section-title {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .row:last-child { margin-bottom: 0; }

    .key { color: #94a3b8; }
    .val { font-weight: 700; }

    .trust { color: #38bdf8; }
    .fake { color: #f87171; }

    #status-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      font-size: 12px;
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #475569;
    }

    #status-dot.active { background: #4ade80; }
    #status-dot.inactive { background: #f87171; }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    footer {
      text-align: center;
      font-size: 11px;
      padding: 10px;
      color: #334155;
    }
  </style>
</head>

<body>

<header>
  <div class="logo-mark">T</div>
  <span class="logo-text">TrustLens</span>
</header>

<main>

  <!-- STATUS -->
  <div id="status-row">
    <span id="status-dot"></span>
    <span id="status-text">Checking page…</span>
  </div>

  <button id="run-btn">Analyze Reviews</button>

  <!-- RESULTS -->
  <div id="result-box" style="display:none;">

    <!-- CORE -->
    <div class="section">
      <div class="section-title">Overview</div>
      <div class="row"><span class="key">Trust Rating</span><span class="val trust" id="res-trust">–</span></div>
      <div class="row"><span class="key">Original Rating</span><span class="val" id="res-original">–</span></div>
      <div class="row"><span class="key">Fake Reviews</span><span class="val fake" id="res-fake">–</span></div>
      <div class="row"><span class="key">Total</span><span class="val" id="res-total">–</span></div>
    </div>

    <!-- SIGNALS -->
    <div class="section">
      <div class="section-title">Signals</div>
      <div class="row"><span class="key">Verified %</span><span class="val" id="res-verified">–</span></div>
      <div class="row"><span class="key">Media Reviews %</span><span class="val" id="res-media">–</span></div>
      <div class="row"><span class="key">Avg Word Count</span><span class="val" id="res-wordcount">–</span></div>
    </div>

    <!-- SENTIMENT -->
    <div class="section">
      <div class="section-title">Text Analysis</div>
      <div class="row"><span class="key">Mismatch %</span><span class="val" id="res-mismatch">–</span></div>
    </div>

    <!-- PERSONA -->
    <div class="section">
      <div class="section-title">User Personas</div>
      <div class="row"><span class="key">Fake Users</span><span class="val fake" id="res-fake-users">–</span></div>
      <div class="row"><span class="key">Suspicious</span><span class="val" id="res-dummy-users">–</span></div>
      <div class="row"><span class="key">Real Users</span><span class="val trust" id="res-real-users">–</span></div>
    </div>

  </div>

</main>

<footer>TrustLens v2 · Intelligence Layer Active</footer>

<script>
const btn = document.getElementById('run-btn');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const resultBox = document.getElementById('result-box');

// Check content script
chrome.tabs.query({ active: true, currentWindow: true }, ([tab]) => {
  chrome.tabs.sendMessage(tab.id, { action: 'ping' }, (res) => {
    if (chrome.runtime.lastError || !res) {
      statusDot.className = 'inactive';
      statusText.textContent = 'Unsupported page';
      btn.disabled = true;
    } else {
      statusDot.className = 'active';
      statusText.textContent = 'Ready';
    }
  });
});

// Run analysis
btn.addEventListener('click', () => {
  btn.textContent = 'Analyzing ⏳';
  btn.disabled = true;

  chrome.tabs.query({ active: true, currentWindow: true }, ([tab]) => {
    chrome.tabs.sendMessage(tab.id, { action: 'runAnalysis' }, (res) => {

      btn.textContent = 'Analyze Reviews';
      btn.disabled = false;

      if (!res || !res.success) {
        statusDot.className = 'inactive';
        statusText.textContent = 'Analysis failed';
        return;
      }

      const r = res.result;

      // CORE
      document.getElementById('res-trust').textContent = r.trustRating + ' ★';
      document.getElementById('res-original').textContent = r.originalRating + ' ★';
      document.getElementById('res-fake').textContent = r.fakePercent + '%';
      document.getElementById('res-total').textContent = r.total;

      // SIGNALS
      document.getElementById('res-verified').textContent = r.verifiedPercent + '%';
      document.getElementById('res-media').textContent = r.mediaPercent + '%';
      document.getElementById('res-wordcount').textContent = r.avgWordCount;

      // SENTIMENT
      document.getElementById('res-mismatch').textContent = r.mismatchPercent + '%';

      // PERSONA
      document.getElementById('res-fake-users').textContent = r.fakeUsers + '%';
      document.getElementById('res-dummy-users').textContent = r.dummyUsers + '%';
      document.getElementById('res-real-users').textContent = r.realUsers + '%';

      resultBox.style.display = 'block';
    });
  });
});
</script>

</body>
</html>
